name: Terraform CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Terraform environment to run
        required: true
        type: choice
        options:
          - dev
          - prod
      action:
        description: Terraform action to run
        required: true
        type: choice
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write

jobs:
  terraform:
    name: Terraform ${{ inputs.action }} (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    defaults:
      run:
        working-directory: infra/envs/${{ inputs.environment }}

    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ vars.AWS_REGION }}
      TF_VAR_project: ${{ vars.TF_PROJECT }}
      TF_VAR_env: ${{ inputs.environment }}
      TF_VAR_docker_image_name: ${{ vars.TF_DOCKER_IMAGE_NAME }}
      TF_VAR_docker_image_tag: ${{ vars.TF_DOCKER_IMAGE_TAG }}
      TF_VAR_github_actions_repository: ${{ vars.TF_GITHUB_ACTIONS_REPOSITORY }}
      TF_VAR_github_actions_branch: ${{ vars.TF_GITHUB_ACTIONS_BRANCH }}
      TF_VAR_domain_name: ${{ vars.TF_DOMAIN_NAME }}
      TF_VAR_app_domain_name: ${{ vars.TF_APP_DOMAIN_NAME }}
      TF_VAR_slack_team_id: ${{ vars.TF_SLACK_TEAM_ID }}
      TF_VAR_slack_critical_channel_id: ${{ vars.TF_SLACK_CRITICAL_CHANNEL_ID }}
      TF_VAR_slack_warning_channel_id: ${{ vars.TF_SLACK_WARNING_CHANNEL_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          required_env_vars=(
            AWS_REGION
            TF_VAR_project
            TF_VAR_docker_image_name
            TF_VAR_docker_image_tag
            TF_VAR_github_actions_repository
            TF_VAR_github_actions_branch
            TF_VAR_domain_name
            TF_VAR_app_domain_name
            TF_VAR_slack_team_id
            TF_VAR_slack_critical_channel_id
            TF_VAR_slack_warning_channel_id
          )

          for env_var in "${required_env_vars[@]}"; do
            if [ -z "${!env_var}" ]; then
              echo "${env_var} is required" >&2
              exit 1
            fi
          done

      - name: Configure optional Terraform variables
        run: |
          if [ -n "${{ vars.TF_GITHUB_ACTIONS_OIDC_PROVIDER_ARN }}" ]; then
            echo "TF_VAR_github_actions_oidc_provider_arn=${{ vars.TF_GITHUB_ACTIONS_OIDC_PROVIDER_ARN }}" >> "$GITHUB_ENV"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.9

      - name: Initialize Terraform
        run: terraform init

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive ../..

      - name: Validate Terraform configuration
        run: terraform validate

      - name: Create Terraform plan
        run: terraform plan -out=tfplan

      - name: Show Terraform plan
        run: terraform show -no-color tfplan

      - name: Apply Terraform plan
        if: inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
