[alembic]
script_location = alembic
prepend_sys_path = .
timezone =
file_template = %%(rev)s_%%(slug)s
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations =
version_path_separator = os
recursive_version_locations = false
output_encoding = utf-8
sqlalchemy.url = sqlite:///./test.db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
